You are given a structured environment metadata table for an indoor daily simulation scene.  
The table describes all objects currently present in the scene and their basic spatial and physical information.

Your job is to understand the environment layout and object availability, so that you can generate feasible subtasks grounded in the scene.

Environment data format:
The environment is represented as a JSON dictionary.
Each key is a unique object or actor ID in the scene.
Each value is an object record containing spatial attributes and semantic labels.

Field definitions:

1. Object ID
- Example: "StaticMeshActor_128", "BP_Door_5_R_C_0"
- Meaning: a unique identifier for one actor or object instance in the scene.
- Use: this ID uniquely distinguishes objects, even when multiple objects share the same semantic label.

2. Location
- Example: "Location": [-34.957287, 857.750489, 0.939939]
- Meaning: the 3D world position of the object, typically represented as [x, y, z].
- Use: use this field to estimate where the object is located in the scene and to reason about relative distance or spatial arrangement.

3. Rotation
- Example: "Rotation": [0.0, -89.999999, 0.0]
- Meaning: the 3D orientation of the object, typically represented as Euler angles.
- Use: this can help infer the facing direction or alignment of the object, but should not be over-interpreted unless orientation is important for the task.

4. BoundingBox
- Example: "BoundingBox": [xmin, ymin, zmin, xmax, ymax, zmax]
- Meaning: the 3D axis-aligned bounding box of the object.
- Use: use this field to estimate the physical extent, occupied space, and approximate size of the object.

5. Contact
- Example: "Contact": ["StaticMeshActor_17", "BP_Curtains_Bedroom1_C_0"]
- Meaning: a list of other object IDs currently touching, attached to, or physically connected to this object.
- Use: this field may indicate support, adjacency, installation, or attachment relationships, but it does not always imply a strong semantic relation.
- Important: do not assume all contact relations mean the objects can be interacted with together. Use this only as supporting evidence.

6. label
- Example: "label": "window", "label": "door"
- Meaning: the semantic category of the object.
- Use: this is the main field for understanding what the object is and for generating meaningful subtasks.

How to interpret the environment:
- Each entry describes one object instance in the scene.
- Multiple entries may share the same label, meaning there are multiple instances of the same object category.
- Objects without a semantic label should not be used as primary task targets unless necessary.
- The environment table provides object presence and approximate spatial structure, but it does not fully specify functionality, affordance, or state unless explicitly provided.

What you may infer:
- Whether an object category exists in the scene
- Approximate object position and size
- Whether multiple objects of the same category are present
- Possible spatial proximity or contact-based relations between objects

What you must not assume unless explicitly supported:
- Whether an object is openable, pickable, movable, or usable
- Whether a door is open or closed
- Whether a window is interactable
- Whether contact implies containment, support, or task relevance
- Any hidden state not represented in the table

Guidelines for task generation:
- Generate only scene-feasible subtasks based on objects that actually exist in the environment metadata.
- Prefer semantically meaningful objects with clear labels.
- Use object labels as the main grounding signal.
- Use location, bounding box, and contact only as auxiliary context.
- Avoid generating tasks that require unsupported affordances or hidden state.
- If multiple objects share the same label, distinguish them by object ID or relative location if needed.
- Keep subtasks atomic, executable, and grounded in observable scene elements.

Example:
If the environment contains several objects labeled "door" and "window", valid grounded subtasks may include:
- Find the door
- Move to the window
- Identify the nearest door
Invalid subtasks would include:
- Open the window, if openability is not explicitly defined
- Hide an item inside the cabinet, if no cabinet or containment relation is given

Your output should always be consistent with the provided environment metadata and should avoid hallucinating missing objects, states, or affordances.